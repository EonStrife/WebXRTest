<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Photosphere Viewer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        let camera, scene, renderer;

        init();
        animate();

        function init() {
            const container = document.createElement( 'div' );
            document.body.appendChild( container );

            // 1. Setup Scene and Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 1000 );
            camera.position.set( 0, 0, 0.1 ); // Slightly offset from pure center to allow OrbitControls to work correctly

            // 2. Create the Enclosing Sphere
            // We use a large sphere (radius 500) and invert the geometry so the texture renders on the inside.
            const geometry = new THREE.SphereGeometry( 500, 60, 40 );
            geometry.scale( - 1, 1, 1 );

            // 3. Load the Photosphere Texture
            // Ensure 'panoramic.png' is in the same directory as this HTML file.
            const textureLoader = new THREE.TextureLoader();
            const texture = textureLoader.load( 'panoramic.png' );
            texture.colorSpace = THREE.SRGBColorSpace; // Ensures correct color mapping in modern Three.js

            const material = new THREE.MeshBasicMaterial( { map: texture } );
            const mesh = new THREE.Mesh( geometry, material );
            scene.add( mesh );

            // 4. Setup WebGLRenderer with WebXR support
            renderer = new THREE.WebGLRenderer();
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.xr.enabled = true; // Crucial for WebXR
            container.appendChild( renderer.domElement );

            // 5. Inject the Enter VR Button
            document.body.appendChild( VRButton.createButton( renderer ) );

            // 6. Setup Mouse Interaction (OrbitControls)
            const controls = new OrbitControls( camera, renderer.domElement );
            controls.enableZoom = false; // Disabled to keep the user strictly at the center
            controls.enablePan = false;  // Disabled to prevent moving out of the sphere's center
            controls.enableDamping = true; // Adds a smooth, kinetic feel to the mouse drag
            controls.dampingFactor = 0.05;

            window.addEventListener( 'resize', onWindowResize );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            // Use setAnimationLoop instead of requestAnimationFrame for WebXR compatibility
            renderer.setAnimationLoop( render );
        }

        function render() {
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
